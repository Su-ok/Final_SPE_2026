---
# FinShield — Ansible Inventory
#
# For LOCAL deployment (running Ansible on this same machine):
#   ansible-playbook -i inventory/hosts.yml playbooks/deploy.yml
#
# For REMOTE deployment: replace ansible_host with your server's IP
# and set ansible_connection: ssh with the correct SSH key.

all:
  children:
    finshield_servers:
      hosts:
        finshield-local:
          ansible_host: localhost
          ansible_connection: local               # No SSH needed for local deploy
          ansible_python_interpreter: /usr/bin/python3

        # Uncomment for remote deployment:
        # finshield-prod:
        #   ansible_host: 192.168.1.100           # ← Replace with your server IP
        #   ansible_user: ubuntu
        #   ansible_connection: ssh
        #   ansible_ssh_private_key_file: ~/.ssh/finshield_key
        #   ansible_python_interpreter: /usr/bin/python3

