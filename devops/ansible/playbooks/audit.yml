---
# FinShield — Environment Audit Playbook
# Used to verify system health before Kubernetes deployment

- name: Pre-Deployment Environment Audit
  hosts: localhost
  connection: local
  gather_facts: yes

  tasks:
    - name: 📋 Check System Memory
      debug:
        msg: "Free Memory: {{ ansible_memfree_mb }} MB / {{ ansible_memtotal_mb }} MB"

    - name: 📦 Check if Docker is running
      command: docker ps
      register: docker_status
      changed_when: false

    - name: 🛡️ Verify Vault Connectivity
      uri:
        url: "http://host.docker.internal:8200/v1/sys/health"
        method: GET
        status_code: [200, 429] # 429 means initialized but sealed, which is fine for a health check
      register: vault_health
      ignore_errors: yes

    - name: 🏗️ Audit Report Summary
      debug:
        msg: |
          ╔══════════════════════════════════════════╗
          ║  FinShield Environment Audit SUCCESS     ║
          ║  Vault Reachable: {{ 'YES' if vault_health.status is defined else 'NO' }}
          ║  Docker Status:   OK                     ║
          ╚══════════════════════════════════════════╝
