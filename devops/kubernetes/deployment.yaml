---
# FinShield — Kubernetes Deployment
# Namespace: finshield
# Rolling updates with zero downtime

apiVersion: v1
kind: Namespace
metadata:
  name: finshield
  labels:
    app: finshield
    environment: production

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: finshield-api
  namespace: finshield
  labels:
    app: finshield-api
    version: "IMAGE_TAG"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: finshield-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0        # Zero downtime (live patching)
  template:
    metadata:
      labels:
        app: finshield-api
        version: "IMAGE_TAG"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: finshield-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: finshield-api
          image: suchirokram/finshield-api:IMAGE_TAG
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: APP_VERSION
              value: "IMAGE_TAG"
            - name: LOGSTASH_HOST
              value: "192.168.49.1" # Standard Minikube Host IP
            - name: LOGSTASH_PORT
              value: "5000"
            - name: VAULT_ADDR
              value: "http://vault-service.finshield.svc.cluster.local:8200"
            - name: VAULT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: vault-token
                  key: token
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: host
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: password
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
      restartPolicy: Always

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: finshield-sa
  namespace: finshield

---
# K8s Secret for Vault token (in production, use Vault Agent Injector instead)
apiVersion: v1
kind: Secret
metadata:
  name: vault-token
  namespace: finshield
type: Opaque
stringData:
  token: "finshield-root-token"   # REPLACE with real Vault token in production

---
apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
  namespace: finshield
type: Opaque
stringData:
  host: "postgres-service.finshield.svc.cluster.local"
  password: "finshield_secret"    # REPLACE — ideally inject from Vault
