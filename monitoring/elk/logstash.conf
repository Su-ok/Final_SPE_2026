# FinShield — Logstash Pipeline Configuration
# Ingests structured JSON logs from finshield-api → Elasticsearch
# Kibana reads from finshield-logs-* index

input {
  # TCP input — finshield-api streams JSON logs here (LOGSTASH_HOST=logstash)
  tcp {
    port => 5000
    codec => json_lines
    tags => ["finshield-api", "tcp"]
  }

  # Beats input — for Filebeat shipping Docker container logs
  beats {
    port => 5044
    tags => ["finshield-beats"]
  }
}

filter {

  # ── Parse @timestamp if present ────────────────────────────────────────────
  if [@timestamp] {
    date {
      match => ["@timestamp", "ISO8601"]
      target => "@timestamp"
    }
  }

  # ── Enrich transaction events ───────────────────────────────────────────────
  if [transaction_id] {
    mutate {
      add_tag => ["transaction"]
      add_field => {
        "[@metadata][index_prefix]" => "finshield-transactions"
      }
    }

    # Flag high-fraud-score transactions
    if [fraud_score] {
      ruby {
        code => "
          score = event.get('fraud_score').to_f
          if score > 0.7
            event.set('alert_level', 'HIGH')
          elsif score > 0.4
            event.set('alert_level', 'MEDIUM')
          else
            event.set('alert_level', 'LOW')
          end
        "
      }
    }
  }

  # ── Enrich HTTP request events ──────────────────────────────────────────────
  if [status_code] {
    mutate {
      add_tag => ["http_request"]
      add_field => {
        "[@metadata][index_prefix]" => "finshield-access"
      }
    }

    # Classify slow requests
    if [duration_ms] {
      ruby {
        code => "
          ms = event.get('duration_ms').to_f
          if ms > 1000
            event.set('performance', 'slow')
          elsif ms > 300
            event.set('performance', 'moderate')
          else
            event.set('performance', 'fast')
          end
        "
      }
    }
  }

  # ── Default index for all other logs ───────────────────────────────────────
  if ![@metadata][index_prefix] {
    mutate {
      add_field => {
        "[@metadata][index_prefix]" => "finshield-logs"
      }
    }
  }

  # ── Remove noisy fields ─────────────────────────────────────────────────────
  mutate {
    remove_field => ["host", "port", "tags"]
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "%{[@metadata][index_prefix]}-%{+YYYY.MM.dd}"
    # Template for field mappings
    manage_template => true
    template_name => "finshield"
  }

  # Debug stdout (comment out in production)
  stdout {
    codec => rubydebug {
      metadata => false
    }
  }
}
